name: CI

on:
    push:
        branches: [develop, release, main]
    pull_request:
        branches: [main]

jobs:
    fmt:
        name: 代码格式检查
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt

            - name: Check formatting
              run: cargo fmt --all -- --check

    clippy:
        name: 静态分析
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy

            - name: Cache dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}

            - name: Run clippy
              run: cargo clippy --all-targets --features "auth,user,photo" -- -D warnings

    unit-test:
        name: 单元测试
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-unit-${{ hashFiles('**/Cargo.lock') }}

            - name: Run unit tests
              run: cargo test --lib

    build:
        name: 构建验证 (${{ matrix.features }})
        runs-on: ubuntu-latest
        strategy:
            matrix:
                features:
                    - "auth"
                    - "auth,user"
                    - "auth,photo"
                    - "auth,user,photo"
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-build-${{ matrix.features }}-${{ hashFiles('**/Cargo.lock') }}

            - name: Build
              run: cargo build --features "${{ matrix.features }}"

