name: Deploy

on:
    push:
        branches: [main]
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always
    BINARY_NAME: memory-seek-server
    DEPLOY_PATH: /opt/memory-seek-server

jobs:
    build:
        name: Build (x86_64-unknown-linux-musl)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-unknown-linux-musl

            - name: Cache Cargo
              uses: Swatinem/rust-cache@v2

            - name: Install system dependencies
              run: sudo apt-get install -y musl-tools

            - name: Build release binary
              run: cargo build --release --target x86_64-unknown-linux-musl

            - name: Upload binary artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ env.BINARY_NAME }}
                  path: target/x86_64-unknown-linux-musl/release/${{ env.BINARY_NAME }}
                  retention-days: 1

    deploy:
        name: Deploy to Server
        runs-on: ubuntu-latest
        needs: build
        environment: production

        steps:
            - name: Download binary artifact
              uses: actions/download-artifact@v4
              with:
                  name: ${{ env.BINARY_NAME }}

            - name: Setup SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key
                  ssh-keyscan -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

            - name: Upload binary to server
              run: |
                  chmod +x ${{ env.BINARY_NAME }}
                  scp -i ~/.ssh/deploy_key \
                      -P ${{ secrets.SERVER_PORT }} \
                      ${{ env.BINARY_NAME }} \
                      ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/${{ env.BINARY_NAME }}.new

            - name: Swap binary & restart service
              run: |
                  ssh -i ~/.ssh/deploy_key \
                      -p ${{ secrets.SERVER_PORT }} \
                      ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
                      set -e
                      cd ${{ env.DEPLOY_PATH }}
                      mv ${{ env.BINARY_NAME }}.new ${{ env.BINARY_NAME }}
                      chmod +x ${{ env.BINARY_NAME }}
                      sudo systemctl restart memory-seek-server
                      sleep 3
                      sudo systemctl is-active --quiet memory-seek-server \
                          && echo "✅ Deploy success" \
                          || (echo "❌ Deploy failed"; sudo journalctl -u memory-seek-server -n 30; exit 1)
                  EOF

            - name: Cleanup SSH key
              if: always()
              run: rm -f ~/.ssh/deploy_key
