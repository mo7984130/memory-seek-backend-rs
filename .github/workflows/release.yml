name: Release

on:
    push:
        branches: [release]
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always
    BINARY_NAME: memory-seek-server
    DEPLOY_PATH: /opt/memory-seek-server

jobs:
    # ── 第一步：构建 ──────────────────────────────
    build:
        name: Build (x86_64-unknown-linux-musl)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-unknown-linux-musl

            - name: Cache Cargo
              uses: Swatinem/rust-cache@v2

            - name: Install system dependencies
              run: sudo apt-get install -y musl-tools

            - name: Build release binary
              run: cargo build --release --target x86_64-unknown-linux-musl

            - name: Upload binary artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ env.BINARY_NAME }}
                  path: target/x86_64-unknown-linux-musl/release/${{ env.BINARY_NAME }}
                  retention-days: 1

    # ── 第二步：压测 ──────────────────────────────
    loadtest:
        name: Load Test
        runs-on: ubuntu-latest
        needs: build
        environment: test

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download binary artifact
              uses: actions/download-artifact@v4
              with:
                  name: ${{ env.BINARY_NAME }}

            - name: Setup SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_KEY }}" > ~/.ssh/test_key
                  chmod 600 ~/.ssh/test_key
                  ssh-keyscan -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

            - name: Upload files to server
              run: |
                  chmod +x ${{ env.BINARY_NAME }}
                  # 创建远程工作目录
                  ssh -i ~/.ssh/test_key -p ${{ secrets.SERVER_PORT }} \
                    ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
                    "mkdir -p /tmp/loadtest"
                  # 上传二进制、SQL 文件、启动脚本、配置模板
                  scp -i ~/.ssh/test_key -P ${{ secrets.SERVER_PORT }} \
                      ${{ env.BINARY_NAME }} \
                      tests/load/setup/start-loadtest.sh \
                      tests/load/setup/stop-loadtest.sh \
                      tests/load/setup/seed.sql \
                      tests/load/setup/loadtest-config.json \
                      docs/sql/init.sql \
                      ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/loadtest/
                  # 上传 docker-compose 并修正 init.sql 路径（本地用 ../../docs/sql/init.sql，远程用 ./init.sql）
                  scp -i ~/.ssh/test_key -P ${{ secrets.SERVER_PORT }} \
                      tests/load/docker-compose.yml \
                      ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/loadtest/docker-compose.yml.src
                  ssh -i ~/.ssh/test_key -p ${{ secrets.SERVER_PORT }} \
                    ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
                    "sed 's|../../docs/sql/init.sql|./init.sql|g' /tmp/loadtest/docker-compose.yml.src > /tmp/loadtest/docker-compose.yml && rm /tmp/loadtest/docker-compose.yml.src"

            - name: Start loadtest environment
              run: |
                  ssh -i ~/.ssh/test_key -p ${{ secrets.SERVER_PORT }} \
                    ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
                    "cd /tmp/loadtest && bash start-loadtest.sh \
                    '${{ secrets.LOADTEST_DB_USER }}' \
                    '${{ secrets.LOADTEST_DB_PASS }}' \
                    '10000' '20' '100000' \
                    './memory-seek-server'"

            - name: Install k6
              run: |
                  sudo gpg -k
                  sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
                    --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
                  echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
                    | sudo tee /etc/apt/sources.list.d/k6.list
                  sudo apt-get update && sudo apt-get install -y k6

            - name: Run load tests
              working-directory: tests/load
              env:
                  BASE_URL: http://${{ secrets.SERVER_HOST }}:7985
              run: |
                  k6 run -e BASE_URL=$BASE_URL scripts/auth/auth_service.js
                  k6 run -e BASE_URL=$BASE_URL scripts/user/user_service.js
                  k6 run -e BASE_URL=$BASE_URL scripts/photo/photo_service.js
                  k6 run -e BASE_URL=$BASE_URL scripts/photo/comment_service.js
                  k6 run -e BASE_URL=$BASE_URL scripts/photo/collection_service.js
                  k6 run -e BASE_URL=$BASE_URL scripts/photo/collection_photo_service.js

            - name: Teardown loadtest environment
              if: always()
              run: |
                  ssh -i ~/.ssh/test_key -p ${{ secrets.SERVER_PORT }} \
                    ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
                    "cd /tmp/loadtest && bash stop-loadtest.sh \
                    '${{ secrets.LOADTEST_DB_USER }}' \
                    '${{ secrets.LOADTEST_DB_PASS }}'"

            - name: Cleanup SSH key
              if: always()
              run: rm -f ~/.ssh/test_key
