# tests/load/docker-compose.yml
services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: test
            POSTGRES_PASSWORD: test
            POSTGRES_DB: memory_seek_test
        ports:
            - "5433:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U test -d memory_seek_test"]
            interval: 3s
            timeout: 5s
            retries: 15
            start_period: 10s # 给 initdb 留出时间

    redis:
        image: redis:7-alpine
        ports:
            - "6380:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 3s
            timeout: 3s
            retries: 10

    minio:
        image: minio/minio:latest
        ports:
            - "9000:9000"
            - "9001:9001"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        command: server /data --console-address ":9001"
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s
