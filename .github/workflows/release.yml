name: Release

on:
    push:
        branches: [release]
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always
    BINARY_NAME: memory-seek-server
    DEPLOY_PATH: /opt/memory-seek-server

jobs:
    # ── 第一步：构建 ──────────────────────────────
    build:
        name: Build (x86_64-unknown-linux-musl)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-unknown-linux-musl

            - name: Cache Cargo
              uses: Swatinem/rust-cache@v2

            - name: Install system dependencies
              run: sudo apt-get install -y musl-tools

            - name: Build release binary
              run: cargo build --release --target x86_64-unknown-linux-musl

            - name: Upload binary artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ env.BINARY_NAME }}
                  path: target/x86_64-unknown-linux-musl/release/${{ env.BINARY_NAME }}
                  retention-days: 1

    # ── 第二步：部署 ──────────────────────────────
    deploy:
        name: Deploy to Server
        runs-on: ubuntu-latest
        needs: build
        environment: test

        steps:
            - name: Download binary artifact
              uses: actions/download-artifact@v4
              with:
                  name: ${{ env.BINARY_NAME }}

            - name: Setup SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.LOADTEST_SSH_KEY }}" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key
                  ssh-keyscan -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

            - name: Upload binary to server
              run: |
                  chmod +x ${{ env.BINARY_NAME }}
                  scp -i ~/.ssh/deploy_key \
                      -P ${{ secrets.SERVER_PORT }} \
                      ${{ env.BINARY_NAME }} \
                      ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/${{ env.BINARY_NAME }}.new

            - name: Swap binary & restart service
              run: |
                  ssh -i ~/.ssh/deploy_key \
                      -p ${{ secrets.SERVER_PORT }} \
                      ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
                      set -e
                      cd ${{ env.DEPLOY_PATH }}
                      mv ${{ env.BINARY_NAME }}.new ${{ env.BINARY_NAME }}
                      chmod +x ${{ env.BINARY_NAME }}
                      sudo systemctl restart memory-seek-server
                      sleep 3
                      sudo systemctl is-active --quiet memory-seek-server \
                          && echo "✅ Deploy success" \
                          || (echo "❌ Deploy failed"; sudo journalctl -u memory-seek-server -n 30; exit 1)
                  EOF

            - name: Cleanup SSH key
              if: always()
              run: rm -f ~/.ssh/deploy_key

    # ── 第三步：压测 ──────────────────────────────
    loadtest:
        name: Load Test
        runs-on: ubuntu-latest
        needs: deploy
        environment: test

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install k6
              run: |
                  sudo gpg -k
                  sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
                    --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
                  echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
                    | sudo tee /etc/apt/sources.list.d/k6.list
                  sudo apt-get update && sudo apt-get install -y k6

            - name: Setup SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.LOADTEST_SSH_KEY }}" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key
                  ssh-keyscan -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

            - name: Seed test data
              run: |
                  ssh -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_PORT }} \
                    ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
                    "psql -U ${{ secrets.LOADTEST_DB_USER }} -d ${{ secrets.LOADTEST_DB_NAME }}" \
                    < tests/load/setup/seed.sql

            - name: Run load tests
              working-directory: tests/load
              run: |
                  k6 run -e BASE_URL=${{ secrets.LOADTEST_BASE_URL }} scripts/auth.js
                  k6 run -e BASE_URL=${{ secrets.LOADTEST_BASE_URL }} scripts/user.js
                  k6 run -e BASE_URL=${{ secrets.LOADTEST_BASE_URL }} scripts/photo.js

            - name: Cleanup test data
              if: always()
              run: |
                  ssh -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_PORT }} \
                    ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
                    "psql -U ${{ secrets.LOADTEST_DB_USER }} -d ${{ secrets.LOADTEST_DB_NAME }}" \
                    < tests/load/setup/cleanup.sql

            - name: Cleanup SSH key
              if: always()
              run: rm -f ~/.ssh/deploy_key
