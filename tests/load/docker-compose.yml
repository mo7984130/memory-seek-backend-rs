# tests/load/docker-compose.yml
services:
    postgres:
        image: postgres:16.14
        environment:
            POSTGRES_USER: test
            POSTGRES_PASSWORD: test
            POSTGRES_DB: memory_seek_test
        volumes:
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql
        ports:
            - "5433:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U test -d memory_seek_test"]
            interval: 3s
            timeout: 5s
            retries: 15
            start_period: 10s

    redis:
        image: redis:7-alpine
        ports:
            - "6380:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 3s
            timeout: 3s
            retries: 10

    minio:
        image: minio/minio:latest
        ports:
            - "9002:9000"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        command: server /data --console-address ":9001"
        healthcheck:
            test:
                ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    init-bucket:
        image: minio/mc:latest
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            echo '等待 MinIO 就绪...';
            sleep 5;
            echo '设置别名...';
            /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
            echo '创建 bucket...';
            /usr/bin/mc mb myminio/memory-seek --ignore-existing;
            echo '设置公开权限...';
            /usr/bin/mc anonymous set public myminio/memory-seek;
            echo 'Bucket 创建成功！';
            /usr/bin/mc ls myminio;
            "
