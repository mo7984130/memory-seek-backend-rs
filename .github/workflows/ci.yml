name: CI

on:
    push:
        branches: [develop, main]
    pull_request:
        branches: [develop, main]

jobs:
    fmt:
        name: 代码格式检查
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt

            - name: Check formatting
              run: cargo fmt --all -- --check

    clippy:
        name: 静态分析
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy

            - uses: Swatinem/rust-cache@v2

            - name: Run clippy
              run: cargo clippy --all-targets -- -D warnings

    unit-test:
        name: 单元测试
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2

            - name: Run unit tests
              run: cargo test --lib

    build:
        name: 构建验证 (${{ matrix.features }})
        runs-on: ubuntu-latest
        strategy:
            matrix:
                features:
                    - "auth"
                    - "auth,user"
                    - "auth,photo"
                    - "auth,user,photo"
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Normalize feature key
              id: cache-key
              run: echo "key=$(echo '${{ matrix.features }}' | tr ',' '-')" >> $GITHUB_OUTPUT

            - uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.features }}

            - name: Build
              run: cargo build --features "${{ matrix.features }}"
