name: Test & Benchmark

on:
    push:
        branches: [develop, release, main]
    pull_request:
        branches: [main]

jobs:
    integration-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust dependencies
              uses: Swatinem/rust-cache@v2

            - name: Start test services
              run: |
                  docker compose -f tests/load/docker-compose.yml up -d postgres redis minio

                  # 等待 postgres 健康（利用 docker-compose healthcheck，最多等 60s）
                  echo "⏳ 等待 postgres 就绪..."
                  timeout 60 bash -c '
                    until docker compose -f tests/load/docker-compose.yml \
                      exec -T postgres pg_isready -U test -d memory_seek_test -q; do
                      echo "  postgres 未就绪，2s 后重试..."
                      sleep 2
                    done
                  ' || {
                    echo "❌ postgres 启动超时，容器日志如下："
                    docker compose -f tests/load/docker-compose.yml logs postgres
                    exit 1
                  }
                  echo "✅ postgres 就绪"

                  # 等待 redis 健康
                  echo "⏳ 等待 redis 就绪..."
                  timeout 30 bash -c '
                    until docker compose -f tests/load/docker-compose.yml \
                      exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; do
                      sleep 2
                    done
                  ' || {
                    echo "❌ redis 启动超时，容器日志如下："
                    docker compose -f tests/load/docker-compose.yml logs redis
                    exit 1
                  }
                  echo "✅ redis 就绪"

                  # 等待 minio 健康
                  echo "⏳ 等待 minio 就绪..."
                  timeout 30 bash -c '
                    until docker compose -f tests/load/docker-compose.yml \
                      exec -T minio mc ready local 2>/dev/null; do
                      echo "  minio 未就绪，2s 后重试..."
                      sleep 2
                    done
                  ' || {
                    echo "❌ minio 启动超时，容器日志如下："
                    docker compose -f tests/load/docker-compose.yml logs minio
                    exit 1
                  }
                  echo "✅ minio 就绪"

            - name: Run integration tests
              run: cargo test -p server --all-features -- --test-threads=1
              env:
                  DATABASE_URL: postgres://test:test@localhost:5433/memory_seek_test
                  REDIS_URL: redis://localhost:6380
                  MINIO_ENDPOINT: http://localhost:9000

            # 失败时打印容器日志，方便排查
            - name: Dump service logs on failure
              if: failure()
              run: |
                  echo "=== postgres ==="
                  docker compose -f tests/load/docker-compose.yml logs postgres
                  echo "=== redis ==="
                  docker compose -f tests/load/docker-compose.yml logs redis
                  echo "=== minio ==="
                  docker compose -f tests/load/docker-compose.yml logs minio

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: target/test-results/
                  if-no-files-found: ignore # 路径不存在时静默跳过，不报错

    # release 才进行负载测试
    load-test:
        runs-on: ubuntu-latest
        needs: integration-test
        if: github.ref == 'refs/heads/release'
        steps:
            - uses: actions/checkout@v4

            - name: Install k6
              run: |
                  sudo gpg -k
                  sudo gpg --no-default-keyring \
                    --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
                    --keyserver hkp://keyserver.ubuntu.com:80 \
                    --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
                  echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
                    https://dl.k6.io/deb stable main" \
                    | sudo tee /etc/apt/sources.list.d/k6.list
                  sudo apt-get update -q
                  sudo apt-get install -y k6

            - name: Start full environment
              run: |
                  docker compose -f tests/load/docker-compose.yml --profile load up -d

                  # 同样用重试等待，不用 sleep 30
                  echo "⏳ 等待所有服务就绪..."
                  timeout 90 bash -c '
                    until docker compose -f tests/load/docker-compose.yml \
                      exec -T postgres pg_isready -U test -d memory_seek_test -q; do
                      sleep 3
                    done
                  ' || {
                    docker compose -f tests/load/docker-compose.yml logs
                    exit 1
                  }
                  echo "✅ 环境就绪"

            - name: Run load tests
              run: |
                  mkdir -p tests/load/results
                  cd tests/load
                  k6 run scripts/auth.js  --out json=results/auth.json
                  k6 run scripts/photo.js --out json=results/photo.json

            - name: Upload load test results
              uses: actions/upload-artifact@v4
              with:
                  name: load-test-results
                  path: tests/load/results/
                  if-no-files-found: warn

            - name: Cleanup
              if: always()
              run: docker compose -f tests/load/docker-compose.yml --profile load down -v
